  <body>

    <h2>Servicios seleccionados</h2>

    <div id="carrito"></div>

    <button onclick="enviarWhatsapp()">Enviar pedido por WhatsApp</button>

    <h2>Servicios disponibles</h2>

    <div id="lista-servicios"></div>

    <script>
      const servicios = [
        { nombre: "Netflix Estándar", precio: 15000 , basico: true},
        { nombre: "Netflix Original 33 Dias", precio: 17000 , medio:true },
        { nombre: "Netflix Completo", precio: 35000 , completo:true },

        { nombre: "Disney+ Estándar", precio: 8000, basico: true },
        { nombre: "Disney+ Premium Ori", precio: 13000 , medio:true},
        { nombre: "Disney+ Completo", precio: 20000 , completo:true },

        { nombre: "HBO MAX", precio: 10000 , basico :true},
        { nombre: "HBO MAX Completo", precio: 15000 , completo:true},
        { nombre: "Max Platino", precio: 10000 , basico: true },
        { nombre: "Max Platino Completa", precio: 25000 , completo:true},
        { nombre: "Amazon Prime Video", precio: 10000, basico: true },
        { nombre: "Amazon Primer Completo", precio: 18000 ,completo:true},
        { nombre: "Plex pantalla", precio: 10000 , basico:true},
        { nombre: "Prlex Completo", precio: 18000 ,completo:true},
        { nombre: "Canva (30) Dias", precio: 10000, basico: true },
        { nombre: "Canva (90) Dias", precio: 17000 },
        { nombre: "Canva Pro 12 Meses", precio: 40000 },
        { nombre: "Paramount+", precio: 8000 , basico: true },
        { nombre: "Paramount+ Completo", precio: 17000 ,completo:true},
        { nombre: "Crunchyroll", precio: 8000, basico: true },
        { nombre: "Crunchyroll Completo", precio: 17000 ,completo:true},
        { nombre: "UNIVERSAL+ PANTALLA", precio: 12000 , medio:true},
        { nombre: "UNIVERSAL COMPLETA", precio: 22000 ,completo:true},
        { nombre: "FLUJO TV (1DISPO)", precio: 15000 , medio:true},
        { nombre: "SMART ONE (Codigo)", precio: 22000 },

        { nombre: "IPTV Original", precio: 15000 ,completo:true},
        { nombre: "IPTV Completa", precio: 20000 ,completo:true},
        { nombre: "IPTV Completa 6 Meses", precio: 50000 ,completo:true},
        { nombre: "IPTV Completa 12 Meses", precio: 70000 ,completo:true},
        { nombre: "Vix (30) Dias", precio: 8000, basico:true },
        { nombre: "Vix Completo", precio: 15000 ,completo:true},
        { nombre: "Chat Gpt 5.0 (30) Dias correo Propio", precio: 19000 },
        { nombre: "DUOLINGO PRO (30) Dias", precio: 10000 , basico : true},
        { nombre: "Flujo Tv Completa", precio: 20000 ,completo:true},
        { nombre: "Flujo TV 3 Meses", precio: 65000 },
        { nombre: "Flujo TV 6 Meses", precio: 125000 },
        { nombre: "Flujo TV Panel 30 creditos COPIA", precio: 220000 },
        { nombre: "Flujo TV Panel 30 Creditos", precio: 450000 },
        { nombre: "Spotify 30 días", precio: 14000, basico: true },
        { nombre: "Spotify 60 días", precio: 22000 },
        { nombre: "Spotify 90 días", precio: 27000 },

        { nombre: "YouTube Premium 30 días", precio: 15000, medio: true },
        { nombre: "YouTube Premium 90 días", precio: 30000 },

        { nombre: "Netflix & Crunchyroll", precio: 20000, premium: true },
        { nombre: "Netflix & HBO Max Platino", precio: 20000, premium: true },
        { nombre: "Netflix & Amazon Primer", precio: 20000, premium: true },
        { nombre: "Paquete Offices 1 año", precio: 45000, premium: true },
      ];

      servicios.sort((a, b) => a.precio - b.precio);

      const lista = document.getElementById("lista-servicios");

      servicios.forEach((s, i) => {
        let clase = s.combo ? "combo" : "";
        if (s.basico) clase += " basico";
        else if (s.medio) clase += " medio";
        else if (s.premium) clase += " premium";
        else if (s.completo) clase += " completo";
        lista.innerHTML += `

<button class="${clase}" onclick="agregar(${i})">

${s.nombre} $${s.precio.toLocaleString()}

</button>

`;
      });

      let carrito = [];
      let total = 0;

      function agregar(i) {
        carrito.push(servicios[i]);

        total += servicios[i].precio;

        mostrarCarrito();
      }

      function mostrarCarrito() {
        let contenedor = document.getElementById("carrito");

        contenedor.innerHTML = "";

        carrito.forEach((s, index) => {
          contenedor.innerHTML += `

<button onclick="eliminar(${index})">

${s.nombre} ❌

</button>

`;
        });

        document.getElementById("total").innerText =
          "Total: $" + total.toLocaleString();
      }

      function eliminar(i) {
        total -= carrito[i].precio;

        carrito.splice(i, 1);

        mostrarCarrito();
      }

      function enviarWhatsapp() {
        let mensaje = "Hola quiero comprar:\n\n";

        carrito.forEach((s) => {
          mensaje += "- " + s.nombre + " $" + s.precio + "\n";
        });

        mensaje += "\nTotal: $" + total.toLocaleString();

        let url =
          "https://wa.me/573222190187?text=" + encodeURIComponent(mensaje);

        window.open(url);
      }
    </script>
  </body>
